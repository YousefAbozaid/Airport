<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airport Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#schedule">Schedule</a>
        <a href="#book">Book Ticket</a>
        <a href="#dashboard">Dashboard</a>
        <a href="#baggage">Baggage</a>
        <a href="#facilities">Facilities</a>
        <a href="#support">Support</a>
    </nav>

<section id="home">
        <div class="home-hero-content">
            <span class="home-badge">✈️ Your Journey Begins Here</span>
            
            <h1 class="home-title">Explore The World Together</h1>
            
            <p class="home-subtitle">Find and book the best flights to your dream destinations with our modern, seamless airport experience.</p>

            <div class="home-search-glass">
                <form class="home-search-form" action="#">
                    <div class="input-group">
                        <label>From</label>
                        <input type="text" placeholder="Departure (e.g., Cairo)" required>
                    </div>
                    
                    <div class="input-group">
                        <label>To</label>
                        <input type="text" placeholder="Destination (e.g., Tokyo)" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Date</label>
                        <input type="date" required>
                    </div>
                    
                    <button type="submit" class="home-search-btn">Search Flights</button>
                </form>
            </div>
        </div>
    </section>

    <section id="schedule"
        </section>

    <section id="book">
        </section>

    <section id="dashboard">
        </section>

    <section id="baggage">
        </section>

    <section id="facilities">
        </section>

    <section id="support">
        </section>

</body>
</html>
